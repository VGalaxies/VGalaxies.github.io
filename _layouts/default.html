<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090a0b">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/visual-reading.css' | relative_url }}">
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" defer></script>
    <script src="{{ '/assets/js/visual-reading.js' | relative_url }}" defer></script>
  </head>
  <body>
    <canvas class="vr-starfield" aria-hidden="true"></canvas>
    {{ content }}
  </body>
</html>
